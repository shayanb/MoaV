site_name: MoaV Docs
site_url: https://moav.sh/docs/
repo_url: https://github.com/shayanb/MoaV
repo_name: shayanb/MoaV
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Getting Started:
    - Setup Guide: SETUP.md
    - DNS Configuration: DNS.md
    - VPS Deployment: DEPLOY.md
  - User Guides:
    - Client Apps: CLIENTS.md
    - MahsaNG Import: mahsanet.md
    - CLI Reference: CLI.md
    - Monitoring: MONITORING.md
    - Troubleshooting: TROUBLESHOOTING.md
  - Security:
    - OPSEC Guide: OPSEC.md
  - About:
    - Mission & Philosophy: philosophy.md
    - Supported Protocols: protocols.md
  - Developer:
    - Protocol Integration: devdocs/PROTOCOL-INTEGRATION-CHECKLIST.md
    - Version Bump Checklist: devdocs/VERSION-BUMP-CHECKLIST.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
